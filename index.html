<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordy Affiliate Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--muted:#9ca3af;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:24px}
.header{text-align:center;margin-bottom:32px;padding:32px 0;border-bottom:1px solid var(--border)}
.header h1{font-size:2.2rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:1rem}
.toggle-row{display:flex;justify-content:center;gap:8px;margin-bottom:32px}
.toggle-btn{padding:10px 28px;border:2px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.toggle-btn:hover{border-color:var(--accent);color:var(--text)}
.toggle-btn.active{border-color:var(--accent);background:rgba(99,102,241,0.15);color:var(--accent)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.kpi-card .label{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.kpi-card .value{font-size:1.8rem;font-weight:700}
.kpi-card .sub{font-size:0.8rem;color:var(--muted);margin-top:4px}
.section{margin-bottom:40px}
.section-title{font-size:1.3rem;font-weight:600;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-subtitle{font-size:0.9rem;color:var(--muted);margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.chart-card h3{font-size:1rem;font-weight:600;margin-bottom:4px}
.chart-card .chart-sub{font-size:0.8rem;color:var(--muted);margin-bottom:16px}
.chart-card canvas{max-height:320px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:10px 12px;background:#1e2030;color:var(--muted);font-weight:600;text-transform:uppercase;font-size:0.7rem;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(99,102,241,0.05)}
.pos{color:var(--green)}.neg{color:var(--red)}
.rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cat-name{font-weight:600;font-size:1.05rem}
.cat-badge{font-size:0.7rem;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-slots{background:rgba(168,85,247,0.2);color:var(--purple)}
.badge-live{background:rgba(59,130,246,0.2);color:var(--blue)}
.badge-sports{background:rgba(239,68,68,0.2);color:var(--red)}
.badge-betting{background:rgba(245,158,11,0.2);color:var(--amber)}
.cat-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.cat-stat:last-child{border:none}
.cat-stat .sl{color:var(--muted);font-size:0.82rem}
.cat-stat .sv{font-weight:600;font-size:0.9rem}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600;margin:1px}
.tag-s{background:rgba(168,85,247,0.2);color:var(--purple)}
.tag-l{background:rgba(59,130,246,0.2);color:var(--blue)}
.tag-sp{background:rgba(239,68,68,0.2);color:var(--red)}
.tag-b{background:rgba(245,158,11,0.2);color:var(--amber)}
.insight-card{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(168,85,247,0.08));border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:20px;margin-bottom:16px}
.insight-card h4{font-size:0.95rem;margin-bottom:8px;color:var(--accent)}
.insight-card p{font-size:0.88rem;color:var(--text);line-height:1.7}
.overlap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;max-width:500px}
.overlap-cell{padding:10px 6px;text-align:center;font-size:0.75rem;border-radius:4px}
.o-h{background:transparent;color:var(--muted);font-weight:600;font-size:0.7rem}
.o-v{background:rgba(99,102,241,0.15)}
.o-s{background:rgba(99,102,241,0.3);font-weight:700}
.pc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.pc-row{display:grid;grid-template-columns:120px 1fr 150px 150px 150px 150px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.pc-hdr{font-size:0.7rem;color:var(--muted);font-weight:600}
.pc-hdr-row{border-bottom:1px solid var(--border);padding:10px 0}
.bar-bg{background:var(--border);border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.story{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:0.85rem;line-height:1.7}
@media(max-width:1100px){.pc-row{grid-template-columns:100px 1fr 120px 120px 120px 120px;font-size:0.8rem}}
</style>
</head>

function _storeIds(ids) {

function copyIds(key, btn) {
  const ids = _idStore[key] || [];
  const text = ids.join(String.fromCharCode(10));
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.style.background = 'rgba(34,197,94,0.3)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.style.background = 'rgba(34,197,94,0.3)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
  });
}

function downloadCsv(key, filename) {
  const ids = _idStore[key] || [];
  const nl = String.fromCharCode(10);
  const csv = 'Player ID' + nl + ids.join(nl);
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'player_ids.csv';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

    <div class="chart-card"><h3>Total Handle by Category</h3><p class="chart-sub">Wagering volume across categories</p><canvas id="c_handle"></canvas></div>

  html += `<div class="section"><div class="section-title">Player Concentration</div><div class="grid-2">

    <div class="chart-card"><h3>Active Player Distribution</h3><p class="chart-sub">Players per category</p><canvas id="c_pdist"></canvas></div>

  // Overlap
  const om = d.overlapMatrix;
  html += `<div class="section"><div class="section-title">Cross-Category Overlap</div><div class="grid-2">
    <div class="chart-card"><h3>Overlap Matrix</h3><p class="chart-sub">Players shared between categories</p>
      <div class="overlap-grid">
        <div class="overlap-cell o-h"></div><div class="overlap-cell o-h">Bet</div><div class="overlap-cell o-h">Live</div><div class="overlap-cell o-h">Slots</div><div class="overlap-cell o-h">Sports</div>
        <div class="overlap-cell o-h">Bet</div><div class="overlap-cell o-s">${om.diag[0]}</div><div class="overlap-cell o-v">${om.bg_lg}</div><div class="overlap-cell o-v">${om.bg_sl}</div><div class="overlap-cell o-v">${om.bg_sp}</div>
        <div class="overlap-cell o-h">Live</div><div class="overlap-cell o-v">${om.bg_lg}</div><div class="overlap-cell o-s">${om.diag[1]}</div><div class="overlap-cell o-v">${om.lg_sl}</div><div class="overlap-cell o-v">${om.lg_sp}</div>
        <div class="overlap-cell o-h">Slots</div><div class="overlap-cell o-v">${om.bg_sl}</div><div class="overlap-cell o-v">${om.lg_sl}</div><div class="overlap-cell o-s">${om.diag[2]}</div><div class="overlap-cell o-v">${om.sl_sp}</div>
        <div class="overlap-cell o-h">Sports</div><div class="overlap-cell o-v">${om.bg_sp}</div><div class="overlap-cell o-v">${om.lg_sp}</div><div class="overlap-cell o-v">${om.sl_sp}</div><div class="overlap-cell o-s">${om.diag[3]}</div>
      </div><p style="margin-top:16px;font-size:0.82rem;color:var(--muted)">${om.allNote}</p></div>
    <div class="chart-card"><h3>Category Participation</h3><p class="chart-sub">How many categories each player is active in</p><canvas id="c_overlap"></canvas></div>
  </div></div>`;

  // Top 20 table
  html += `<div class="section"><div class="section-title">Top 20 Players — Combined All Categories</div><div class="chart-card"><div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Player ID</th><th>Total Bets</th><th style="color:var(--purple)">Slots</th><th style="color:var(--blue)">Live</th><th style="color:var(--amber)">Betting</th><th style="color:var(--red)">Sports</th><th>GGR</th><th>We Earn</th><th>Categories</th></tr></thead><tbody>`;
  d.top20.forEach((p,i) => {
    html += `<tr><td><span class="rank">${i+1}</span></td><td>${p.id}</td><td>${p.bets}</td><td style="color:var(--purple);font-size:0.8rem">${p.slotsBets}</td><td style="color:var(--blue);font-size:0.8rem">${p.liveBets}</td><td style="color:var(--amber);font-size:0.8rem">${p.bettingBets}</td><td style="color:var(--red);font-size:0.8rem">${p.sportsBets}</td><td class="${p.gc}">${p.ggr}</td><td class="${p.cc}">${p.comm}</td><td>${p.tags}</td></tr>`;
  });
  html += `</tbody></table></div></div></div>`;

  // Insights
  html += `<div class="section"><div class="section-title">Content Strategy Insights — ${d.month}</div>`;
  d.insights.forEach(ins => {
    html += `<div class="insight-card"><h4>${ins.title}</h4><p>${ins.text}</p></div>`;
  });
  html += `</div>`;

  document.getElementById('dashboard').innerHTML = html;

  // Build charts
  const ch = d.charts;
  Chart.defaults.color = '#9ca3af';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
  Chart.defaults.font.family = "'Inter',-apple-system,BlinkMacSystemFont,sans-serif";

  charts.handle = new Chart(document.getElementById('c_handle'), {type:'bar',data:{labels:ch.handle.labels,datasets:[{data:ch.handle.data,backgroundColor:ch.handle.colors,borderRadius:6,barThickness:32}]},options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R'+ctx.parsed.x.toLocaleString()}}},scales:{x:{ticks:{callback:v=>'R'+(v/1e6).toFixed(1)+'M'},grid:{display:false}},y:{grid:{display:false}}}}});

  charts.comm = new Chart(document.getElementById('c_comm'), {type:'bar',data:{labels:ch.commission.labels,datasets:[{data:ch.commission.data,backgroundColor:ch.commission.colors,borderRadius:6,barThickness:40}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R'+ctx.parsed.y.toLocaleString()}}},scales:{y:{ticks:{callback:v=>'R'+(v/1e3).toFixed(0)+'K'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}});

  charts.ggr = new Chart(document.getElementById('c_ggr'), {type:'bar',data:{labels:ch.ggr.labels,datasets:[{data:ch.ggr.data,backgroundColor:ch.ggr.colors,borderRadius:6,barThickness:40}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R'+ctx.parsed.y.toLocaleString()}}},scales:{y:{ticks:{callback:v=>'R'+(v/1e3).toFixed(0)+'K'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}});

  charts.he = new Chart(document.getElementById('c_he'), {type:'bar',data:{labels:ch.houseEdge.labels,datasets:[{data:ch.houseEdge.data,backgroundColor:ch.houseEdge.colors,borderRadius:6,barThickness:40}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toFixed(2)+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}});

  charts.conc = new Chart(document.getElementById('c_conc'), {type:'bar',data:{labels:ch.concentration.labels,datasets:[{label:'Top 5',data:ch.concentration.t5,backgroundColor:'rgba(99,102,241,0.8)',borderRadius:4,barThickness:18},{label:'Top 10',data:ch.concentration.t10,backgroundColor:'rgba(168,85,247,0.8)',borderRadius:4,barThickness:18},{label:'Top 20',data:ch.concentration.t20,backgroundColor:'rgba(236,72,153,0.8)',borderRadius:4,barThickness:18}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'%'}}},scales:{y:{max:105,ticks:{callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}});

  charts.pdist = new Chart(document.getElementById('c_pdist'), {type:'doughnut',data:{labels:ch.playerDist.labels,datasets:[{data:ch.playerDist.data,backgroundColor:ch.playerDist.colors,borderWidth:0,hoverOffset:8}]},options:{cutout:'60%',plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+' players'}}}}});

  charts.overlap = new Chart(document.getElementById('c_overlap'), {type:'doughnut',data:{labels:['1 Category','2 Categories','3 Categories','4 Categories'],datasets:[{data:ch.overlap.data,backgroundColor:['#6366f1','#a855f7','#ec4899','#f59e0b'],borderWidth:0,hoverOffset:8}]},options:{cutout:'60%',plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+' players'}}}}});

  // New players chart (only if data exists)
  if (d.newReturning && document.getElementById('c_newplayers')) {
    const nr = d.newReturning;
    charts.newplayers = new Chart(document.getElementById('c_newplayers'), {
      type:'bar',
      data:{
        labels: nr.perCat.map(c=>c.cat),
        datasets:[
          {label:'New Players',data:nr.perCat.map(c=>c.newP),backgroundColor:'rgba(34,197,94,0.7)',borderRadius:4,barThickness:28},
          {label:'Returning',data:nr.perCat.map(c=>c.totalP-c.newP),backgroundColor:'rgba(59,130,246,0.7)',borderRadius:4,barThickness:28}
        ]
      },
      options:{
        plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+' players'}}},
        scales:{y:{stacked:true,ticks:{callback:v=>v+' players'},grid:{color:'rgba(255,255,255,0.04)'}},x:{stacked:true,grid:{display:false}}}
      }
    });
  }
}

  html += `<div class="section"><div class="section-title">Player Loyalty Analysis — The 3% That Matter</div>

    html += `<div class="kpi-card" style="border-left:4px solid ${stat.color};background:${stat.bg}"><div class="label">${stat.label}</div><div class="value" style="color:${stat.color}">${stat.count}</div><div class="sub">${stat.pct} of total</div></div>`;

  // Collapsible player ID lists per cohort with category breakdown
  if (d.cohortIds && d.cohortIds.length > 0) {

      {key:'two_month', label:'Active 2 of 3 months', color:'var(--blue)', border:'rgba(59,130,246,0.3)', bg:'rgba(59,130,246,0.06)'},

        // Category breakdown section
        if (cohort.catBreakdown && cohort.catBreakdown.length > 0) {

            cat.ids.forEach(id => {

  html += `</tbody></table></div></div>`;

  // Cross-category overlap
  html += `<div class="section"><div class="section-title">Cross-Category Overlap — How Players Diversify</div><div class="grid-2">
    <div><h3 style="margin-bottom:16px;font-size:1.05rem">Overlap Matrix</h3>
      <div style="background:rgba(99,102,241,0.08);padding:16px;border-radius:8px;font-size:0.85rem;line-height:1.6">

          <div><strong>Live + Sports:</strong> 147 players</div>

    d.playerSegments.forEach(seg => {
      html += `<div style="border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:16px;background:var(--card)">

        <div style="display:flex;flex-direction:column;gap:10px">`;
      seg.rows.forEach(row => {
        const color = row.color || 'var(--text)';

          <span style="font-size:0.9rem;color:var(--muted)">${row.label}</span>
          <div style="text-align:right">
            <div style="font-weight:700;color:${color};font-size:1rem">${row.value}</div>
            ${row.subval ? `<div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${row.subval}</div>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  // Signup Cohort Value
  if (d.signupCohorts && d.signupCohorts.length > 0) {
    html += `<div class="section"><div class="section-title">Signup Cohort Value — When Did High-Value Players Join?</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Month</th><th>Signups</th><th>Deposited</th><th>Conv%</th><th>Total Deposits</th><th>Net Revenue</th><th>Avg Value/Depositor</th></tr></thead>
        <tbody>`;
    d.signupCohorts.forEach(cohort => {
      const convColor = cohort.convRateRaw >= 40 ? 'var(--green)' : cohort.convRateRaw >= 25 ? 'var(--amber)' : 'var(--red)';
      const revColor = cohort.netRevenueRaw >= 0 ? 'var(--green)' : 'var(--red)';
      html += `<tr>
        <td>${cohort.month}</td>
        <td>${cohort.signups}</td>
        <td>${cohort.depositors}</td>
        <td style="color:${convColor}">${cohort.convRate}</td>
        <td>${cohort.totalDeposits}</td>
        <td style="color:${revColor}">${cohort.netRevenue}</td>
        <td>${cohort.avgValue}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

    // Chart canvas
    html += `<div class="chart-card"><h3>Monthly Cohort Net Revenue & Deposits</h3><p class="chart-sub">Revenue generated per signup cohort over time</p><canvas id="c_cohortValue"></canvas></div>`;

    // Collapsible cohort details
    d.signupCohorts.forEach(cohort => {
      const convColor = cohort.convRateRaw >= 40 ? '#22c55e' : cohort.convRateRaw >= 25 ? '#f59e0b' : '#ef4444';
      const convBgColor = cohort.convRateRaw >= 40 ? 'rgba(34,197,94,0.06)' : cohort.convRateRaw >= 25 ? 'rgba(245,158,11,0.06)' : 'rgba(239,68,68,0.06)';
      const convBorderColor = cohort.convRateRaw >= 40 ? 'rgba(34,197,94,0.3)' : cohort.convRateRaw >= 25 ? 'rgba(245,158,11,0.3)' : 'rgba(239,68,68,0.3)';

      html += `<details style="margin-top:12px;border:1px solid ${convBorderColor};border-radius:8px;overflow:hidden">
        <summary style="cursor:pointer;padding:12px 16px;background:${convBgColor};font-weight:600;font-size:0.9rem;color:${convColor};display:flex;justify-content:space-between;align-items:center">
          <span>${cohort.month} — ${cohort.signups} signups, ${cohort.depositors} deposited (${cohort.convRate})</span>
          <span style="font-size:0.75rem;color:var(--muted)">Click to expand</span>
        </summary>
        <div style="padding:12px 16px;background:var(--card);max-height:600px;overflow-y:auto">`;

      // Render calendar heatmap if calendar data available
      if (cohort.calendarDays && cohort.calendarDays.length > 0) {
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const firstDow = cohort.firstDow || 0;

        html += `<div style="margin-bottom:16px">
          <div style="font-size:0.85rem;margin-bottom:8px"><strong>Daily Signup Heatmap:</strong></div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:0.75rem;margin-bottom:12px">`;

        // Header row
        days.forEach(day => {
          html += `<div style="color:var(--muted);padding:4px;font-size:0.7rem;font-weight:600">${day}</div>`;
        });

        // Empty cells for offset to first day
        for (let i = 0; i < firstDow; i++) {
          html += `<div></div>`;
        }

        // Day cells
        cohort.calendarDays.forEach(day => {
          const opacity = day.signups === 0 ? 0.05 : (0.05 + (day.signups / cohort.maxDailySignups) * 0.55);
          const bgColor = 'rgba(34,197,94,' + opacity + ')';
          const nr = Math.round(day.netRev);
          const nrStr = nr >= 0 ? 'R' + nr.toLocaleString() : '-R' + Math.abs(nr).toLocaleString();
          const nrColor = nr > 0 ? 'var(--green)' : nr < 0 ? 'var(--red)' : 'var(--muted)';
          const nrDisplay = day.depositors > 0 ? nrStr : '';
          html += `<div style="background:${bgColor};border-radius:4px;padding:4px 2px;min-height:56px;cursor:pointer" title="${day.signups} signups, ${day.depositors} deposited, Net Revenue: ${nrStr}">
            <div style="color:var(--muted);font-size:0.6rem">${day.day}</div>
            <div style="font-weight:700;color:var(--green);font-size:0.85rem">${day.signups > 0 ? day.signups : ''}</div>
            <div style="font-size:0.55rem;color:${nrColor};font-weight:${Math.abs(nr) > 10000 ? '700' : '400'}">${nrDisplay}</div>
          </div>`;
        });

        html += `</div></div>`;

        // Find top 3 days by net revenue (actual value created)
        const sortedByValue = [...cohort.calendarDays].filter(d => d.signups > 0).sort((a, b) => b.netRev - a.netRev).slice(0, 3);
        // Also top 3 by volume
        const sortedByVolume = [...cohort.calendarDays].sort((a, b) => b.signups - a.signups).slice(0, 3);

        html += `<div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:12px;margin:12px 0;font-size:0.85rem">
          <strong style="color:var(--green)">📅 Highest Value Days — What content drove real revenue?</strong>
          <div style="margin-top:8px">`;

        sortedByValue.forEach(day => {
          const dateObj = new Date(cohort.year, cohort.monthNum - 1, day.day);
          const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const dayName = dayNames[dateObj.getDay()];
          const nrVal = Math.round(day.netRev);
          const nrFmt = nrVal >= 0 ? 'R' + nrVal.toLocaleString() : '-R' + Math.abs(nrVal).toLocaleString();
          const nrClr = nrVal >= 0 ? 'var(--green)' : 'var(--red)';
          html += `<div style="margin-bottom:6px">💰 ${cohort.month.split(' ')[0]} ${day.day} (${dayName}): <strong style="color:${nrClr}">${nrFmt}</strong> net revenue — ${day.signups} signups, ${day.depositors} deposited</div>`;
        });

        // Also show top volume days if different
        const valueIds = new Set(sortedByValue.map(d => d.day));
        const volumeOnly = sortedByVolume.filter(d => !valueIds.has(d.day));
        if (volumeOnly.length > 0) {
          html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)"><strong style="color:var(--amber)">📊 Highest Volume Days:</strong></div>`;
          volumeOnly.forEach(day => {
            const dateObj = new Date(cohort.year, cohort.monthNum - 1, day.day);
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayName = dayNames[dateObj.getDay()];
            const nrVal = Math.round(day.netRev);
            const nrFmt = nrVal >= 0 ? 'R' + nrVal.toLocaleString() : '-R' + Math.abs(nrVal).toLocaleString();
            const nrClr = nrVal >= 0 ? 'var(--green)' : 'var(--red)';
            html += `<div style="margin-bottom:6px">📊 ${cohort.month.split(' ')[0]} ${day.day} (${dayName}): <strong>${day.signups}</strong> signups — <span style="color:${nrClr}">${nrFmt}</span> net revenue</div>`;
          });
        }

        html += `</div></div>`;
      }

      html += `<div style="margin-bottom:12px">
            <div style="font-size:0.85rem;margin-bottom:8px"><strong>All ${cohort.month} Players (${cohort.playerIds.length}):</strong></div>`;
      html += exportButtons(cohort.playerIds, cohort.month + ' Signups');
      html += `<div style="display:flex;flex-wrap:wrap;gap:4px;max-height:200px;overflow-y:auto">`;

      cohort.playerIds.forEach(id => {
        html += `<span style="background:rgba(255,255,255,0.05);border:1px solid ${convBorderColor};border-radius:4px;padding:2px 8px;font-size:0.75rem;font-family:monospace">${id}</span>`;
      });

      html += `</div></div>`;

      if (cohort.topPlayerIds && cohort.topPlayerIds.length > 0) {
        html += `<div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;margin-top:12px">
          <div style="font-size:0.85rem;margin-bottom:8px"><strong>Top 5 Players by Net Revenue:</strong></div>
          <div style="font-size:0.8rem">`;

        cohort.topPlayerIds.forEach(p => {
          html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <span style="font-family:monospace">${p.id}</span>
            <span style="text-align:right">
              <div>Deposits: ${p.deposits}</div>
              <div style="color:${p.net_rev.startsWith('-') ? 'var(--red)' : 'var(--green)'}">${p.net_rev}</div>
              <div style="color:var(--muted)">W/D: ${p.wd_rate}</div>
            </span>
          </div>`;
        });

        html += `</div></div>`;
      }

      html += `</div></details>`;
    });

    html += `</div>`;
  }

  // Top 20 Most Valuable Signups
  if (d.topValuePlayers && d.topValuePlayers.length > 0) {
    html += `<div class="section"><div class="section-title">Top 20 Most Valuable Signups — All Time</div>
      <div class="table-wrap" style="max-height:600px;overflow-y:auto"><table>
        <thead><tr><th>Rank</th><th>Player ID</th><th>Signed Up</th><th>Deposits</th><th>Withdrawals</th><th>W/D Ratio</th><th>Net Revenue</th></tr></thead>
        <tbody>`;
    d.topValuePlayers.forEach(p => {
      const revColor = p.netRaw >= 0 ? 'var(--green)' : 'var(--red)';
      const wdColor = p.wdRateRaw < 50 ? 'var(--green)' : p.wdRateRaw < 80 ? 'var(--amber)' : 'var(--red)';
      html += `<tr>
        <td><span class="rank">${p.rank}</span></td>
        <td style="font-family:monospace;font-weight:600">${p.id}</td>
        <td>${p.regDate}</td>
        <td>${p.deposits}</td>
        <td>${p.withdrawals}</td>
        <td style="color:${wdColor}">${p.wdRate}</td>
        <td style="color:${revColor};font-weight:600">${p.netRevenue}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }

  // Growth Campaigns
  if (d.campaigns && d.campaigns.length > 0) {
    html += `<div class="section"><div class="section-title">Growth Campaigns — What to Do Next</div>`;
    d.campaigns.forEach(camp => {
      html += `<div style="display:grid;grid-template-columns:80px 1fr;gap:16px;padding:16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;margin-bottom:12px;background:var(--card)">
        <div style="display:flex;align-items:flex-start">
          <div style="background:${camp.priorityColor};color:white;padding:4px 8px;border-radius:4px;font-size:0.75rem;font-weight:700;text-align:center;word-break:break-word">${camp.priority}</div>
        </div>
        <div>
          <h3 style="margin:0 0 4px 0;font-size:1rem;color:var(--text)">${camp.title}</h3>
          <p style="margin:0 0 8px 0;font-size:0.9rem;color:var(--muted)">${camp.subtitle}</p>
          <div style="margin-bottom:12px;padding:8px 12px;background:rgba(99,102,241,0.08);border-left:3px solid #6366f1;border-radius:4px">
            <p style="margin:0;font-size:0.85rem"><strong style="color:var(--text)">Target:</strong> ${camp.target}</p>
          </div>
          <div style="margin-bottom:12px;padding:8px 12px;background:rgba(34,197,94,0.08);border-left:3px solid var(--green);border-radius:4px">
            <p style="margin:0;font-size:0.85rem"><strong style="color:var(--text)">Action:</strong> ${camp.action}</p>
          </div>
          <div style="margin-bottom:12px;padding:8px 12px;background:rgba(168,85,247,0.08);border-left:3px solid var(--purple);border-radius:4px">
            <p style="margin:0;font-size:0.85rem"><strong style="color:var(--text)">Expected Impact:</strong> ${camp.expected_impact}</p>
          </div>
          ${camp.targetIds && camp.targetIds.length > 0 ? `<details style="margin-top:8px">
            <summary style="cursor:pointer;font-size:0.85rem;color:#6366f1;padding:4px 0;font-weight:600">
              📋 ${camp.targetIds.length} target player IDs — Click to view & export ▸
            </summary>
            <div style="padding:8px;margin-top:4px">
              ` + exportButtons(camp.targetIds, camp.title + ' Target IDs') + `
              <div style="max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px">
                ${camp.targetIds.map(id=>`<span style="background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.4);border-radius:3px;padding:2px 6px;font-size:0.75rem;font-family:monospace;color:#6366f1">${id}</span>`).join('')}
              </div>
            </div>
          </details>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Strategic insights
  html += `<div class="section"><div class="section-title">Strategic Insights — All-Time Lessons</div>`;
  d.insights.forEach(ins => {
    html += `<div class="insight-card"><h4>${ins.title}</h4><p>${ins.text}</p></div>`;
  });
  html += `</div>`;

  document.getElementById('dashboard').innerHTML = html;

  // Build charts
  Chart.defaults.color = '#9ca3af';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
  Chart.defaults.font.family = "'Inter',-apple-system,BlinkMacSystemFont,sans-serif";

  // Monthly commission stacked bar
  const mc = d.charts.monthlyComm;
  charts.monthlycomm = new Chart(document.getElementById('c_monthlycomm'), {
    type:'bar',
    data:{
      labels: mc.labels,
      datasets: mc.datasets.map(ds => ({...ds, borderRadius:4, barThickness:40}))
    },
    options:{
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:16}},
        tooltip:{callbacks:{label:ctx=>'R'+ctx.parsed.y.toLocaleString()}}
      },
      scales:{
        y:{stacked:true,ticks:{callback:v=>'R'+(v/1e3).toFixed(0)+'K'},grid:{color:'rgba(255,255,255,0.04)'}},
        x:{stacked:true,grid:{display:false}}
      }
    }
  });

  // House edge trend
  const he = d.charts.houseEdgeTrend;
  charts.heedge = new Chart(document.getElementById('c_heedge'), {
    type:'line',
    data:{
      labels: he.labels,
      datasets:[{
        label:'House Edge %',
        data: he.data,
        borderColor: he.colors,
        backgroundColor: 'rgba(6,182,212,0.1)',
        borderWidth: 3,
        fill: true,
        pointRadius: 5,
        pointBackgroundColor: he.colors,
        tension: 0.3
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toFixed(2)+'%'}}
      },
      scales:{
        y:{ticks:{callback:v=>v.toFixed(2)+'%'},grid:{color:'rgba(255,255,255,0.04)'}},
        x:{grid:{display:false}}
      }
    }
  });

  // Monthly handle by category (line chart)
  const mh = d.charts.monthlyHandle;
  charts.monthlyhandle = new Chart(document.getElementById('c_monthlyhandle'), {
    type:'line',
    data:{labels:mh.labels,datasets:mh.datasets.map(ds=>({...ds,borderWidth:3,fill:false,pointRadius:5,tension:0.3}))},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': R'+(ctx.parsed.y/1e6).toFixed(2)+'M'}}},scales:{y:{ticks:{callback:v=>'R'+(v/1e6).toFixed(1)+'M'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}
  });

  // Monthly GGR by category (line chart)
  const mg = d.charts.monthlyGGR;
  charts.monthlyggr = new Chart(document.getElementById('c_monthlyggr'), {
    type:'line',
    data:{labels:mg.labels,datasets:mg.datasets.map(ds=>({...ds,borderWidth:3,fill:false,pointRadius:5,tension:0.3}))},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': R'+ctx.parsed.y.toLocaleString()}}},scales:{y:{ticks:{callback:v=>'R'+(v/1e3).toFixed(0)+'K'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}
  });

  // Monthly players by category (line chart)
  const mp = d.charts.monthlyPlayers;
  charts.monthlyplayers = new Chart(document.getElementById('c_monthlyplayers'), {
    type:'line',
    data:{labels:mp.labels,datasets:mp.datasets.map(ds=>({...ds,borderWidth:3,fill:false,pointRadius:5,tension:0.3}))},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+' players'}}},scales:{y:{ticks:{callback:v=>v+' players'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}
  });

  // Monthly house edge by category (line chart)
  const me = d.charts.monthlyEdge;
  charts.monthlyedge = new Chart(document.getElementById('c_monthlyedge'), {
    type:'line',
    data:{labels:me.labels,datasets:me.datasets.map(ds=>({...ds,borderWidth:3,fill:false,pointRadius:5,tension:0.3}))},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toFixed(2)+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}}}
  });

  // Category commission doughnut
  const cc = d.charts.categoryComm;
  charts.catcomm = new Chart(document.getElementById('c_catcomm'), {
    type:'doughnut',
    data:{
      labels: cc.labels,
      datasets:[{
        data: cc.data,
        backgroundColor: cc.colors,
        borderWidth: 0,
        hoverOffset: 8
      }]
    },
    options:{
      cutout:'60%',
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:16}},
        tooltip:{callbacks:{label:ctx=>'R'+ctx.parsed.toLocaleString()}}
      }
    }
  });

  // Player loyalty doughnut
  const pd = d.charts.playerDist;
  charts.loyalty = new Chart(document.getElementById('c_loyalty'), {
    type:'doughnut',
    data:{
      labels: pd.labels,
      datasets:[{
        data: pd.data,
        backgroundColor: pd.colors,
        borderWidth: 0,
        hoverOffset: 8
      }]
    },
    options:{
      cutout:'60%',
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:16}},
        tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+' players'}}
      }
    }
  });

  // Concentration bar chart
  const conc = d.charts.concentration;
  charts.concentration = new Chart(document.getElementById('c_concentration'), {
    type:'bar',
    data:{
      labels: conc.labels,
      datasets:[{
        label:'Commission %',
        data: conc.data,
        backgroundColor: conc.colors,
        borderRadius: 6,
        barThickness: 40
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toFixed(1)+'%'}}
      },
      scales:{
        y:{max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}},
        x:{grid:{display:false}}
      }
    }
  });

  // Signup cohort value chart
  if (d.signupCohorts && d.signupCohorts.length > 0) {
    const cohortLabels = d.signupCohorts.map(c => c.month);
    const cohortRevData = d.signupCohorts.map(c => c.netRevenueRaw);
    const cohortDepData = d.signupCohorts.map(c => c.totalDepositsRaw);

    charts.cohortValue = new Chart(document.getElementById('c_cohortValue'), {
      type:'bar',
      data:{
        labels: cohortLabels,
        datasets:[
          {
            label:'Net Revenue',
            data: cohortRevData,
            backgroundColor: cohortRevData.map(v => v >= 0 ? '#22c55e' : '#ef4444')
          },
          {
            label:'Total Deposits',
            data: cohortDepData,
            backgroundColor: 'rgba(99,102,241,0.5)'
          }
        ]
      },
      options:{
        plugins:{
          legend:{position:'bottom'}
        },
        scales:{
          y:{
            ticks:{callback:v=>'R'+(v/1000).toFixed(0)+'K'}
          }
        }
      }
    });
  }

  // Category overlap distribution doughnut
  const oc = d.charts.overlapCats;
  charts.overlapcats = new Chart(document.getElementById('c_overlapcats'), {
    type:'doughnut',
    data:{
      labels: oc.labels,
      datasets:[{
        data: oc.data,
        backgroundColor: oc.colors,
        borderWidth: 0,
        hoverOffset: 8
      }]
    },
    options:{
      cutout:'60%',
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:16}},
        tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+' players'}}
      }
    }
  });
}

// Initial render
render('jan');
</script>
</body>
</html>
